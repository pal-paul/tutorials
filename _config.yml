title: Coding with Pal-Paul
email: palashpaul.net@gmail.com
description: >-
  Tutorials and hands-on guides on cloud infrastructure, Terraform, Go, GitHub Actions, and Google Cloud Platform.

markdown: kramdown
baseurl: "/tutorials"
url: "https://pal-paul.github.io"
twitter_username: pal-paul
github_username:  pal-paul

# Build settings
theme: minima
show_excerpts: true

minima:
  date_format: "%b %-d, %Y"

plugins:
  - jekyll-feed

# Exclude from processing.
